name: Release

on:
  push:
    tags:
      - "v*.*.*"

# 同一 tag 不重复构建
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 前置：跑完整 CI 确保发布质量
  ci-pass:
    name: CI Must Pass
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow
        run: echo "Triggered by tag ${{ github.ref_name }}. Ensure CI workflow passes before merging the tag."

  # ============ 发布 Docker 镜像 ============
  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: ci-pass
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}/api:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}/web:${{ steps.meta.outputs.short_sha }}
          build-args: |
            NEXT_PUBLIC_GAOKAO_AGENT_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ 创建 GitHub Release ============
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
