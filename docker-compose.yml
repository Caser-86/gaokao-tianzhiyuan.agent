services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: gaokao-agent-api:latest
    container_name: gaokao-agent-api
    restart: unless-stopped
    environment:
      GAOKAO_AGENT_ENVIRONMENT: ${GAOKAO_AGENT_ENVIRONMENT:-development}
      GAOKAO_AGENT_ADMIN_TOKEN: ${GAOKAO_AGENT_ADMIN_TOKEN:?GAOKAO_AGENT_ADMIN_TOKEN is required}
      GAOKAO_AGENT_DATABASE_URL: sqlite:////app/var/gaokao-agent.db
      GAOKAO_AGENT_CORS_ALLOWED_ORIGINS: ${GAOKAO_AGENT_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      GAOKAO_AGENT_LLM_PROVIDER: ${GAOKAO_AGENT_LLM_PROVIDER:-}
      GAOKAO_AGENT_LLM_BASE_URL: ${GAOKAO_AGENT_LLM_BASE_URL:-}
      GAOKAO_AGENT_LLM_API_KEY: ${GAOKAO_AGENT_LLM_API_KEY:-}
      GAOKAO_AGENT_LLM_MODEL: ${GAOKAO_AGENT_LLM_MODEL:-}
      GAOKAO_AGENT_SMART_ANALYSIS_MODE: ${GAOKAO_AGENT_SMART_ANALYSIS_MODE:-off}
      GAOKAO_AGENT_WECHAT_OFFICIAL_ACCOUNT_TOKEN: ${GAOKAO_AGENT_WECHAT_OFFICIAL_ACCOUNT_TOKEN:-}
      GAOKAO_AGENT_WECHAT_OFFICIAL_ACCOUNT_APP_ID: ${GAOKAO_AGENT_WECHAT_OFFICIAL_ACCOUNT_APP_ID:-}
      GAOKAO_AGENT_WECHAT_OFFICIAL_ACCOUNT_ENCODING_AES_KEY: ${GAOKAO_AGENT_WECHAT_OFFICIAL_ACCOUNT_ENCODING_AES_KEY:-}
    volumes:
      - api-var:/app/var
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GAOKAO_AGENT_API_URL: ${NEXT_PUBLIC_GAOKAO_AGENT_API_URL:-http://localhost:8000}
    image: gaokao-agent-web:latest
    container_name: gaokao-agent-web
    restart: unless-stopped
    environment:
      GAOKAO_AGENT_API_URL: http://api:8000
      GAOKAO_AGENT_ADMIN_TOKEN: ${GAOKAO_AGENT_ADMIN_TOKEN:-dev-admin-token}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  api-var:
